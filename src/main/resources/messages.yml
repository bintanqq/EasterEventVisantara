# =====================================================
#   EasterEventVisantara - messages.yml
#   Palette: &d (Pink), &e (Kuning), &b (Aqua), &f (Putih)
#   TANPA BOLD (&l)
# =====================================================

prefix: "&d[EasterEvent] &r"

no-permission: "&cMaaf, kamu tidak diizinkan menggunakan perintah ini."

not-player: "&cPerintah ini hanya untuk pemain."

unknown-subcommand: "&7Gunakan: &d/easter <reload|spawn|debug|status>"

reload:
  success: "&aKonfigurasi berhasil diperbarui."

spawn:
  success: "&bEaster Balloon &fberhasil dimunculkan."
  failed: "&cGagal memunculkan balon, cek console."

debug:
  enabled: "&dDebug mode: &aON"
  disabled: "&dDebug mode: &cOFF"

  # Debug tetap teknis (Inggris)
  spawn-info: "&7[DEBUG] &fSpawn at &e{x}, {y}, {z} &f| World: &e{world}"
  hit-info: "&7[DEBUG] &fEntity: &e{entity} &f| Item: &e{item} &f| Valid: &e{passed}"
  despawn-info: "&7[DEBUG] &fEntity: &e{entity} &fdespawned (timeout)."

cap-reached: "&eSpawn skipped: &7Limit tercapai untuk pemain ini."

item-mismatch: "&dGunakan item khusus untuk memecahkan balon ini!"

balloon:
  popped: "&d{player} &fberhasil memecahkan &eEaster Balloon&f!"

status:
  header: "&d--- Easter Status ---"
  check-mode: "&fCap Mode: &e{mode}"
  global: "&fGlobal Active: &d{active}&f / &d{cap}"
  per-player: "&f  &d{player}&f: &e{active}&f / &e{cap}"