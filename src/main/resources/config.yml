# =====================================================
#   EasterEventVisantara - config.yml
# =====================================================

balloon:
  mythicmob-id: "EasterBalloon"

  # ── Spawn ─────────────────────────────────────────
  # How often the spawn cycle runs (minutes).
  spawn-interval-minutes: 1
  # Horizontal radius around each player to attempt spawning.
  spawn-radius: 12.0
  # Probability (0.0–1.0) that a spawn attempt succeeds per player per cycle.
  spawn-chance: 0.50
  # Worlds where balloon spawning is disabled.
  disabled-worlds:
    - "world_nether"
    - "world_the_end"

  # ── Float Height ──────────────────────────────────
  # Random float height range above the surface (blocks).
  float-height-min: 3
  float-height-max: 5
  # Minimum world Y for a valid spawn point (prevents underground spawns).
  spawn-min-y: 60

  # ── Cap ───────────────────────────────────────────
  # Max balloons active server-wide. Set -1 for unlimited.
  global-cap: 20
  # Max balloons per player. Used when cap-check-per-player is true.
  per-player-cap: 5
  # Min balloons attempted per player per cycle. Randomised between min and cap.
  per-player-min: 1
  # true = enforce cap per player | false = enforce global cap.
  cap-check-per-player: true
  # Seconds before an un-popped balloon auto-despawns.
  despawn-seconds: 60

  # ── Item Requirement ──────────────────────────────
  # Require a specific item to pop the balloon.
  require-specific-item: false
  # Formats: VANILLA:<MATERIAL> | MMOITEMS:<TYPE>:<ID>
  required-item: "VANILLA:STICK"

  # ── Notification ──────────────────────────────────
  # Send a notification to a player when a balloon spawns near them.
  notify-on-spawn: true
  # Notification types. Options: CHAT, ACTIONBAR, BOSSBAR (can combine).
  notify-type:
    - BOSSBAR
    - CHAT
  # BossBar color: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
  bossbar-color: PINK
  # BossBar style: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
  bossbar-style: SOLID
  # How long (seconds) the bossbar/actionbar notification stays visible.
  notify-duration-seconds: 10

  # ── Sound ─────────────────────────────────────────
  notify-sound-enabled: true
  # Reference: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
  notify-sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  notify-sound-volume: 1.0
  notify-sound-pitch: 1.2

  # ── Reward ────────────────────────────────────────
  # true = broadcast pop message to all players | false = killer only.
  announce-global: true
  # Console commands on pop. Use %player% as the killer's name.
  reward-commands:
    - "give %player% minecraft:egg 3"
    - "eco give %player% 50"