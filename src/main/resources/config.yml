# =====================================================
#   EasterEventVisantara - config.yml
# =====================================================

balloon:

  # ID MythicMob yang akan di-spawn sebagai balon.
  # Pastikan ID ini terdaftar di folder MythicMobs/Mobs/.
  mythicmob-id: "EasterBalloon"

  # --------------------------------------------------
  # PENGATURAN SPAWN
  # --------------------------------------------------

  # Seberapa sering task spawn berjalan, dalam satuan MENIT.
  spawn-interval-minutes: 2

  # Jumlah maksimal player yang dicek per satu siklus task.
  # Mencegah lag saat banyak player online.
  max-spawns-per-batch: 2

  # Radius horizontal (dalam blok) di sekitar player untuk spawn.
  spawn-radius: 24.0

  # Probabilitas spawn berhasil per siklus (0.0 - 1.0).
  spawn-chance: 0.50

  # --------------------------------------------------
  # BATAS JUMLAH BALON (CAP)
  # --------------------------------------------------

  # Batas maksimal balon aktif di seluruh server.
  # Set -1 untuk unlimited (tidak ada batas global).
  global-cap: 20

  # Batas maksimal balon aktif per player.
  # Hanya berlaku jika cap-check-per-player: true.
  per-player-cap: 3

  # true  → batas dihitung per player (pakai per-player-cap).
  # false → batas dihitung global (pakai global-cap).
  cap-check-per-player: true

  # --------------------------------------------------
  # DESPAWN OTOMATIS
  # --------------------------------------------------

  # Detik sebelum balon yang tidak ditembak otomatis despawn.
  despawn-seconds: 60

  # --------------------------------------------------
  # PERSYARATAN ITEM
  # --------------------------------------------------

  # true  → player harus memegang item tertentu untuk memencet balon.
  # false → balon bisa dipencet dengan item apapun.
  require-specific-item: false

  # Format:
  #   VANILLA:<MATERIAL>        contoh: VANILLA:STICK
  #   MMOITEMS:<TYPE>:<ID>      contoh: MMOITEMS:SWORD:EASTER_LANCE
  required-item: "VANILLA:STICK"

  # --------------------------------------------------
  # REWARD & ANNOUNCE
  # --------------------------------------------------

  # true  → pesan pop di-broadcast ke seluruh server.
  # false → pesan pop hanya dikirim ke player yang memencet.
  announce-global: true

  # Command console saat balon berhasil dipencet.
  # Gunakan %player% sebagai placeholder nama player.
  reward-commands:
    - "give %player% minecraft:egg 3"
    - "eco give %player% 50"