balloon:
  # ID MythicMob untuk balon Easter
  mythicmob-id: "EasterBalloon"

  # Seberapa sering siklus spawn balon berjalan (menit)
  spawn-interval-minutes: 1

  # Radius horizontal di sekitar pemain untuk mencoba spawn
  spawn-radius: 12.0

  # Probabilitas spawn berhasil per pemain per siklus (0.0–1.0)
  spawn-chance: 0.50

  # World yang dinonaktifkan dari spawn balon
  disabled-worlds:
    - "world_nether"
    - "world_the_end"
    - "SpawnLobby"

  # Range tinggi balon saat muncul di atas permukaan (blok)
  float-height-min: 3
  float-height-max: 5

  # Y minimum agar titik spawn dianggap valid
  spawn-min-y: 60

  # Aktifkan gerakan naik perlahan pada balon
  float-enabled: true

  # Kecepatan naik per tick. 0.03 = lambat seperti balon helium
  float-rise-speed: 0.03

  # Batas maksimal ketinggian naik dari titik spawn. -1 = tidak terbatas
  float-max-y-offset: 10

  # Batas maksimal balon aktif di seluruh server. -1 = tidak terbatas
  global-cap: 20

  # Batas balon per pemain (digunakan saat cap-check-per-player: true)
  per-player-cap: 5

  # Minimal balon yang dicoba per pemain per siklus
  per-player-min: 1

  # true = cek cap per pemain | false = cek cap global
  cap-check-per-player: true

  # Detik sebelum balon yang belum dipecahkan otomatis hilang
  despawn-seconds: 60

  # Wajibkan item tertentu untuk memecahkan balon
  require-specific-item: false

  # Format: VANILLA:<MATERIAL> atau MMOITEMS:<TYPE>:<ID>
  required-item: "VANILLA:STICK"

  # Kirim notifikasi ke pemain saat balon muncul di dekatnya
  notify-on-spawn: true

  # Tipe notifikasi: CHAT, ACTIONBAR, BOSSBAR (bisa dikombinasi)
  notify-type:
    - BOSSBAR
    - CHAT

  # Warna BossBar: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
  bossbar-color: PINK

  # Gaya BossBar: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
  bossbar-style: SOLID

  # Durasi tampil notifikasi bossbar/actionbar (detik)
  notify-duration-seconds: 10

  # Aktifkan efek suara saat notifikasi spawn
  notify-sound-enabled: true

  # Referensi: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
  notify-sound: "ENTITY_CHICKEN_EGG"
  notify-sound-volume: 1.0
  notify-sound-pitch: 1.2

  # true = umumkan ke semua pemain | false = hanya ke pemain yang memecahkan
  announce-global: true

  # Perintah console saat balon dipecahkan. Gunakan %player% sebagai nama pemain
  reward-commands:
    - "give %player% minecraft:egg 3"
    - "eco give %player% 50"