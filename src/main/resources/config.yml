# =====================================================
#   EasterEventVisantara - config.yml
# =====================================================

world-settings:
  resource-world-name: "easter_resource"
  reset-time: "00:00"
  # Ukuran world border (diameter = total lebar dari -X ke +X).
  # 5000 = area 5000x5000 blok (dari -2500 sampai +2500 di tiap arah).
  # Kalau mau 5000 ke tiap arah (10000x10000 total), set ke 10000.
  border-size: 5000.0

  fallback-spawn:
    # Koordinat tujuan teleport saat world locked/reset
    # Set ke spawn utama server kamu
    world: "SpawnLobby"
    x: 522.0
    y: -10.0
    z: -213.0
    yaw: 0.0
    pitch: 0.0

structure-settings:
  # Whitelist biome yang boleh di-spawn struktur.
  # KOSONGKAN untuk allow semua biome (disarankan untuk awal testing).
  # Untuk cek nama biome aktual pakai: /easter debug biome
  # Contoh nama: plains, meadow, flower_forest, sunflower_plains
  biome-whitelist: []
  # biome-whitelist:
  #   - "plains"
  #   - "meadow"
  #   - "sunflower_plains"
  #   - "flower_forest"

  # Probabilitas struktur muncul per chunk (0.0-1.0).
  # 0.05 = 5% per chunk = sekitar 10-20 struktur per 500x500 area.
  # Turunkan untuk lebih rare, naikkan untuk lebih sering.
  spawn-chance: 1.0

  max-per-chunk: 1

  # Jarak minimum antar struktur (blok). Naikkan untuk lebih jarang/tersebar.
  min-distance-between: 256

  # Total maksimum struktur di seluruh world. -1 = tidak terbatas.
  max-total: 30

  # Radius footprint struktur (blok). Semua titik dalam area ini dicek soliditasnya.
  # Set sesuai lebar schem kamu: schem 10x10 blok = radius 5.
  # Makin besar = makin ketat, makin banyak lokasi yang di-reject.
  flat-check-radius: 4

  # Toleransi ketinggian antar titik footprint (blok).
  # 2 = boleh ada perbedaan 2 blok naik/turun dalam area footprint.
  # Turunkan ke 1 untuk terrain yang sangat flat saja.
  flat-max-height-diff: 2

  # Tinggi ruang udara di atas struktur (blok). Set sesuai tinggi schem.
  # Rumah 2 lantai ~8 blok: set 10. Schem besar: set lebih tinggi.
  clear-height-above: 10

  # Radius chunk yang di-seed saat world dibuat/seed manual.
  # -1 = otomatis ikut border-size (direkomendasikan).
  # > 0 = override manual, max 64. Contoh: 16 = area 512x512 blok.
  seed-chunk-radius: -1
  variants:
    SmallBasket:
      schematic: "rumahdonat.schem"
      weight: 5
      loot-table: "common_basket"
      # Offset Y saat paste. Positif = naik, negatif = turun ke bawah.
      # Sesuaikan agar struktur tidak amblas ke tanah. Mulai dari 0, coba -1, -2, dst.
      paste-y-offset: 0
    GiantEgg:
      schematic: "oakhouse.schem"
      weight: 3
      loot-table: "rare_egg"
      # Offset Y saat paste. Positif = naik, negatif = turun ke bawah.
      # Sesuaikan agar struktur tidak amblas ke tanah. Mulai dari 0, coba -1, -2, dst.
      paste-y-offset: 0
    EasterShrine:
      schematic: "EasterShrine.schem"
      weight: 1
      loot-table: "epic_shrine"
      # Offset Y saat paste. Positif = naik, negatif = turun ke bawah.
      # Sesuaikan agar struktur tidak amblas ke tanah. Mulai dari 0, coba -1, -2, dst.
      paste-y-offset: 0

